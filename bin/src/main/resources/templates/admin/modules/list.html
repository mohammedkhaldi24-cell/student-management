<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Modules')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-admin}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Gestion des Modules')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="bi bi-book-fill me-2"></i>Modules (Matières)</h6>
                    <a th:href="@{/admin/modules/new}" class="btn btn-primary btn-sm">
                        <i class="bi bi-plus-circle me-1"></i>Nouveau Module
                    </a>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr><th>Code</th><th>Nom</th><th>Coeff.</th><th>Semestre</th><th>Filière</th><th>Enseignant</th><th>Actions</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="m : ${modules}">
                                    <td><span class="badge bg-warning text-dark" th:text="${m.code}">-</span></td>
                                    <td class="fw-semibold" th:text="${m.nom}">-</td>
                                    <td class="text-center"><span class="badge bg-secondary" th:text="${m.coefficient}">1</span></td>
                                    <td><span class="badge bg-info" th:text="${m.semestre}">-</span></td>
                                    <td th:text="${m.filiere.nom}">-</td>
                                    <td>
                                        <span th:if="${m.teacher != null}" th:text="${m.teacher.fullName}" class="text-success fw-semibold">-</span>
                                        <span th:unless="${m.teacher != null}" class="text-muted fst-italic">Non assigné</span>
                                    </td>
                                    <td>
                                        <div class="btn-group btn-group-sm">
                                            <a th:href="@{/admin/modules/{id}/edit(id=${m.id})}" class="btn btn-outline-primary">
                                                <i class="bi bi-pencil"></i>
                                            </a>
                                            <form th:action="@{/admin/modules/{id}/delete(id=${m.id})}" method="post" class="d-inline"
                                                  onsubmit="return confirm('Supprimer ce module ?')">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                <button class="btn btn-outline-danger"><i class="bi bi-trash"></i></button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(modules)}">
                                    <td colspan="7" class="text-center py-4 text-muted">Aucun module</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
