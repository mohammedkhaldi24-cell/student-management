<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Classe')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-admin}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Classe')}"></div>
        <div class="content-area">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card">
                        <div class="card-header"><h6 class="mb-0"><i class="bi bi-building me-2"></i>Classe</h6></div>
                        <div class="card-body">
                            <form th:action="${classe.id != null} ? @{/admin/classes/{id}/edit(id=${classe.id})} : @{/admin/classes/new}"
                                  th:object="${classe}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Nom de la classe *</label>
                                    <input type="text" class="form-control" th:field="*{nom}" placeholder="ex: L3 Info A" required/>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Niveau *</label>
                                    <select class="form-select" th:field="*{niveau}" required>
                                        <option value="">-- Sélectionner --</option>
                                        <option value="L1">Licence 1</option>
                                        <option value="L2">Licence 2</option>
                                        <option value="L3">Licence 3</option>
                                        <option value="M1">Master 1</option>
                                        <option value="M2">Master 2</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Année Académique *</label>
                                    <input type="text" class="form-control" th:field="*{anneeAcademique}" placeholder="ex: 2024-2025" required/>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Filière *</label>
                                    <select class="form-select" name="filiereId" required>
                                        <option value="">-- Sélectionner une filière --</option>
                                        <option th:each="f : ${filieres}"
                                                th:value="${f.id}"
                                                th:text="${f.nom}"
                                                th:selected="${classe.filiere != null and classe.filiere.id == f.id}">Filière</option>
                                    </select>
                                </div>
                                <div class="d-flex justify-content-end gap-2 mt-4">
                                    <a th:href="@{/admin/classes}" class="btn btn-secondary">Annuler</a>
                                    <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Enregistrer</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
