<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Étudiants')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-chef}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Liste des Étudiants')}"></div>
        <div class="content-area">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">
                        <i class="bi bi-person-lines-fill me-2"></i>
                        Étudiants — Filière <span th:text="${filiere?.nom}">-</span>
                    </h6>
                    <span class="badge bg-primary" th:text="${#lists.size(etudiants)} + ' étudiant(s)'">0</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr><th>Matricule</th><th>Nom Prénom</th><th>Classe</th><th>Niveau</th><th>Email</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="s : ${etudiants}">
                                    <td><code th:text="${s.matricule}">-</code></td>
                                    <td>
                                        <div class="d-flex align-items-center gap-2">
                                            <div class="user-avatar-sm">
                                                <span th:text="${#strings.substring(s.user.firstName,0,1)+#strings.substring(s.user.lastName,0,1)}">AB</span>
                                            </div>
                                            <span class="fw-semibold" th:text="${s.fullName}">-</span>
                                        </div>
                                    </td>
                                    <td th:text="${s.classe?.nom ?: '-'}">-</td>
                                    <td><span class="badge bg-secondary" th:text="${s.classe?.niveau ?: '-'}">-</span></td>
                                    <td th:text="${s.email ?: '-'}">-</td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(etudiants)}">
                                    <td colspan="5" class="text-center py-4 text-muted">Aucun étudiant</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
