<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Mes Cours')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-student}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Mes Cours')}"></div>
        <div class="content-area">
            <div class="d-flex flex-wrap gap-2 mb-3">
                <a th:href="@{/student/dashboard}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Retour Dashboard
                </a>
                <a th:href="@{/student/announcements}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-megaphone me-1"></i>Annonces
                </a>
                <a th:href="@{/student/emploi-du-temps}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-calendar3-week me-1"></i>Emploi du temps
                </a>
            </div>

            <div class="row g-3">
                <div class="col-12" th:if="${#lists.isEmpty(courses)}">
                    <div class="card">
                        <div class="card-body text-center py-5 text-muted">
                            <i class="bi bi-journals fs-1 d-block mb-3"></i>
                            Aucun contenu de cours disponible.
                        </div>
                    </div>
                </div>

                <div class="col-lg-6" th:each="c : ${courses}">
                    <div class="card h-100">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span class="fw-semibold" th:text="${c.title}">Titre</span>
                            <span class="badge bg-info" th:text="${c.module != null ? c.module.code : '-'}">MOD</span>
                        </div>
                        <div class="card-body">
                            <p class="mb-2"><strong>Module:</strong> <span th:text="${c.module != null ? c.module.nom : '-'}">Module</span></p>
                            <p class="mb-2"><strong>Enseignant:</strong> <span th:text="${c.teacher != null ? c.teacher.fullName : '-'}">Teacher</span></p>
                            <p class="small text-muted mb-3" th:text="${c.description != null ? c.description : 'Aucune description.'}">
                                Description
                            </p>
                            <div class="d-flex justify-content-between align-items-center">
                                <small class="text-muted" th:text="${#temporals.format(c.createdAt,'dd/MM/yyyy HH:mm')}">Date</small>
                                <a th:if="${c.filePath != null}" th:href="@{/student/courses/{id}/download(id=${c.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-download me-1"></i>Fichier
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
