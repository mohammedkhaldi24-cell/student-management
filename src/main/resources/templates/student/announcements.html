<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Annonces')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-student}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Annonces')}"></div>
        <div class="content-area">
            <div class="d-flex flex-wrap gap-2 mb-3">
                <a th:href="@{/student/dashboard}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Retour Dashboard
                </a>
                <a th:href="@{/student/courses}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-journals me-1"></i>Cours
                </a>
                <a th:href="@{/student/assignments}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-journal-check me-1"></i>Devoirs
                </a>
            </div>

            <div class="card">
                <div class="card-header">
                    <h6 class="mb-0"><i class="bi bi-megaphone me-2"></i>Annonces pour votre classe/filiere</h6>
                </div>
                <div class="card-body">
                    <div class="timeline">
                        <div th:if="${#lists.isEmpty(announcements)}" class="text-center py-4 text-muted">
                            Aucune annonce pour le moment.
                        </div>

                        <div th:each="a : ${announcements}" class="border rounded p-3 mb-3">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h6 class="fw-bold mb-0" th:text="${a.title}">Titre</h6>
                                <small class="text-muted" th:text="${#temporals.format(a.createdAt,'dd/MM/yyyy HH:mm')}">Date</small>
                            </div>
                            <p class="mb-2" th:text="${a.message}">Message</p>
                            <div class="d-flex gap-2">
                                <span th:if="${a.targetClasse != null}" class="badge bg-primary"
                                      th:text="${'Classe: ' + a.targetClasse.nom}">Classe</span>
                                <span th:if="${a.targetClasse == null and a.targetFiliere != null}" class="badge bg-info"
                                      th:text="${'Filiere: ' + a.targetFiliere.nom}">Filiere</span>
                                <span class="badge bg-secondary"
                                      th:text="${a.author != null ? 'Par: ' + a.author.fullName : 'Auteur inconnu'}">Auteur</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
