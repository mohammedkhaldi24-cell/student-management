<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Contenus de Cours')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-teacher}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Contenus de Cours')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="bi bi-journals me-2"></i>Mes contenus publies</h6>
                    <a th:href="@{/teacher/courses/new}" class="btn btn-primary btn-sm">
                        <i class="bi bi-plus-circle me-1"></i>Nouveau contenu
                    </a>
                </div>
                <div class="card-body border-bottom">
                    <div class="d-flex flex-wrap gap-2 align-items-center">
                        <a th:href="@{/teacher/courses}"
                           class="btn btn-sm"
                           th:classappend="${selectedModuleId == null} ? ' btn-primary' : ' btn-outline-primary'">
                            Tous les modules
                        </a>
                        <a th:each="m : ${modules}"
                           th:href="@{/teacher/courses(moduleId=${m.id})}"
                           class="btn btn-sm"
                           th:classappend="${selectedModuleId != null and selectedModuleId == m.id} ? ' btn-primary' : ' btn-outline-primary'"
                           th:text="${m.nom + ' (' + m.code + ')'}">Module</a>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th>Titre</th>
                                <th>Module</th>
                                <th>Cible</th>
                                <th>Date</th>
                                <th>Fichier</th>
                                <th class="text-center">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="c : ${courses}">
                                <td class="fw-semibold" th:text="${c.title}">Titre</td>
                                <td th:text="${c.module != null ? c.module.nom : '-'}">Module</td>
                                <td>
                                    <span th:if="${c.classe != null}" class="badge bg-primary"
                                          th:text="${'Classe: ' + c.classe.nom}">Classe</span>
                                    <span th:if="${c.classe == null and c.filiere != null}" class="badge bg-info"
                                          th:text="${'Filiere: ' + c.filiere.nom}">Filiere</span>
                                </td>
                                <td th:text="${#temporals.format(c.createdAt,'dd/MM/yyyy HH:mm')}">01/04/2026</td>
                                <td>
                                    <div th:if="${c.files != null and not #lists.isEmpty(c.files)}" class="d-grid gap-1">
                                        <a th:each="file : ${c.files}"
                                           th:href="@{/teacher/courses/{id}/files/{fileId}/download(id=${c.id},fileId=${file.id})}"
                                           class="btn btn-sm btn-outline-secondary text-start">
                                            <i th:class="${T(com.pfe.gestionetudiant.util.FileUiUtils).iconClass(file.filePath)}"></i>
                                            <span class="ms-1" th:text="${T(com.pfe.gestionetudiant.util.FileUiUtils).fileName(file.filePath)}">fichier</span>
                                            <small class="text-muted ms-1" th:text="${T(com.pfe.gestionetudiant.util.FileUiUtils).readableSize(file.filePath)}">-</small>
                                        </a>
                                    </div>
                                    <a th:if="${(c.files == null or #lists.isEmpty(c.files)) and c.filePath != null}"
                                       th:href="@{/teacher/courses/{id}/download(id=${c.id})}"
                                       class="btn btn-sm btn-outline-secondary">
                                        <i th:class="${T(com.pfe.gestionetudiant.util.FileUiUtils).iconClass(c.filePath)}"></i>
                                        <span class="ms-1" th:text="${T(com.pfe.gestionetudiant.util.FileUiUtils).fileName(c.filePath)}">Telecharger</span>
                                    </a>
                                    <span th:if="${(c.files == null or #lists.isEmpty(c.files)) and c.filePath == null}" class="text-muted">Aucun</span>
                                </td>
                                <td class="text-center">
                                    <form th:action="@{/teacher/courses/{id}/delete(id=${c.id})}" method="post"
                                          onsubmit="return confirm('Supprimer ce contenu ?')" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(courses)}">
                                <td colspan="6" class="text-center py-4 text-muted">Aucun contenu publie.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
