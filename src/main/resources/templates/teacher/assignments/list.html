<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Devoirs')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-teacher}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Gestion des Devoirs')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="bi bi-journal-check me-2"></i>Mes devoirs</h6>
                    <a th:href="@{/teacher/assignments/new}" class="btn btn-primary btn-sm">
                        <i class="bi bi-plus-circle me-1"></i>Nouveau devoir
                    </a>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th>Titre</th>
                                <th>Module</th>
                                <th>Cible</th>
                                <th>Date limite</th>
                                <th>Etat</th>
                                <th class="text-center">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="a : ${assignments}">
                                <td>
                                    <div class="fw-semibold" th:text="${a.title}">Titre</div>
                                    <small class="text-muted"
                                           th:text="${a.description != null and #strings.length(a.description) > 80 ? #strings.substring(a.description,0,80) + '...' : a.description}">
                                        Description
                                    </small>
                                </td>
                                <td th:text="${a.module != null ? a.module.nom : '-'}">Module</td>
                                <td>
                                    <span th:if="${a.targetClasse != null}" class="badge bg-primary"
                                          th:text="${'Classe: ' + a.targetClasse.nom}">Classe</span>
                                    <span th:if="${a.targetClasse == null and a.targetFiliere != null}" class="badge bg-info"
                                          th:text="${'Filiere: ' + a.targetFiliere.nom}">Filiere</span>
                                </td>
                                <td>
                                    <span th:text="${#temporals.format(a.dueDate, 'dd/MM/yyyy HH:mm')}">01/04/2026 23:59</span>
                                    <span class="badge bg-danger ms-1"
                                          th:if="${a.dueDate.isBefore(now)}">Termine</span>
                                </td>
                                <td>
                                    <span th:if="${a.published}" class="badge bg-success">Publie</span>
                                    <span th:unless="${a.published}" class="badge bg-secondary">Brouillon</span>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/teacher/assignments/{id}(id=${a.id})}" class="btn btn-outline-secondary" title="Details">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/teacher/assignments/{id}/submissions(id=${a.id})}" class="btn btn-outline-primary" title="Soumissions">
                                            <i class="bi bi-inbox"></i>
                                        </a>
                                        <a th:href="@{/teacher/assignments/{id}/edit(id=${a.id})}" class="btn btn-outline-warning" title="Modifier">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form th:action="@{/teacher/assignments/{id}/delete(id=${a.id})}" method="post"
                                              onsubmit="return confirm('Supprimer ce devoir ?')" class="d-inline">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button class="btn btn-outline-danger" type="submit" title="Supprimer">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(assignments)}">
                                <td colspan="6" class="text-center py-4 text-muted">Aucun devoir cree pour le moment.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
