<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Saisie des Notes')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-teacher}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Saisie des Notes')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card mb-4">
                <div class="card-header">
                    <h6 class="mb-0"><i class="bi bi-lightning-charge me-2"></i>Workflow rapide professeur</h6>
                </div>
                <div class="card-body">
                    <form id="selectionForm" class="row g-3 align-items-end">
                        <div class="col-md-5">
                            <label class="form-label fw-semibold">Module</label>
                            <select id="moduleSelect" class="form-select" onchange="updateClasses()">
                                <option value="">-- Selectionner un module --</option>
                                <option th:each="m : ${modules}"
                                        th:value="${m.id}"
                                        th:data-filiere="${m.filiere != null ? m.filiere.id : ''}"
                                        th:data-filiere-name="${m.filiere != null ? m.filiere.nom : 'Filiere du module'}"
                                        th:text="${m.nom + ' (' + m.semestre + ')'}">Module</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Classe</label>
                            <select id="classeSelect" class="form-select" onchange="updateAudience()">
                                <option value="">Auto / toute la filiere</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-semibold">Semestre</label>
                            <select id="semestreSelect" class="form-select">
                                <option value="S1">S1</option>
                                <option value="S2">S2</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-semibold">Annee</label>
                            <input type="text" id="anneeInput" class="form-control" th:value="${anneeAcademique}"/>
                        </div>
                        <div class="col-12">
                            <div id="audienceSummary" class="alert alert-light border mb-0">
                                Choisissez un module. La filiere, la classe si detectee et les etudiants seront charges automatiquement.
                            </div>
                        </div>
                        <div class="col-md-6">
                            <button type="button" class="btn btn-primary w-100" onclick="ouvrirNotes()">
                                <i class="bi bi-pencil-square me-1"></i>Entrer les notes
                            </button>
                        </div>
                        <div class="col-md-6">
                            <button type="button" class="btn btn-outline-danger w-100" onclick="ouvrirAbsences()">
                                <i class="bi bi-calendar-check me-1"></i>Marquer les absences de la session
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="instructionsZone" class="text-center py-5 text-muted">
                <i class="bi bi-arrow-up-circle fs-1 mb-3 d-block text-primary"></i>
                <h5>Selectionnez un module pour commencer</h5>
                <p>La classe et la liste des etudiants seront determinees automatiquement quand c'est possible.</p>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:inline="javascript">
    const classesByFiliere = /*[[${classesByFiliere}]]*/ {};

    function updateClasses() {
        const moduleSelect = document.getElementById('moduleSelect');
        const classeSelect = document.getElementById('classeSelect');
        const selectedOption = moduleSelect.options[moduleSelect.selectedIndex];
        const filiereId = selectedOption ? selectedOption.getAttribute('data-filiere') : null;

        classeSelect.innerHTML = '<option value="">Auto / toute la filiere</option>';
        (classesByFiliere[filiereId] || []).forEach(c => {
            const option = document.createElement('option');
            option.value = c.id;
            option.textContent = `${c.nom} (${c.niveau})`;
            classeSelect.appendChild(option);
        });
        updateAudience();
    }

    function updateAudience() {
        const moduleSelect = document.getElementById('moduleSelect');
        const classeSelect = document.getElementById('classeSelect');
        const selectedOption = moduleSelect.options[moduleSelect.selectedIndex];
        const filiereName = selectedOption ? selectedOption.getAttribute('data-filiere-name') : '';
        const selectedClass = classeSelect.value ? classeSelect.options[classeSelect.selectedIndex].text : '';
        const summary = document.getElementById('audienceSummary');

        if (!moduleSelect.value) {
            summary.textContent = 'Choisissez un module. La filiere, la classe si detectee et les etudiants seront charges automatiquement.';
            return;
        }
        summary.textContent = selectedClass
            ? `Audience: ${selectedClass} | ${filiereName}`
            : `Audience automatique: ${filiereName}. Le site choisira la classe de la session du jour si elle existe.`;
    }

    function buildTarget(base) {
        const moduleId = document.getElementById('moduleSelect').value;
        const classeId = document.getElementById('classeSelect').value;
        if (!moduleId) {
            alert('Veuillez selectionner un module.');
            return null;
        }
        const params = new URLSearchParams();
        if (classeId) params.set('classeId', classeId);
        if (base.includes('/notes/')) {
            params.set('semestre', document.getElementById('semestreSelect').value);
            params.set('annee', document.getElementById('anneeInput').value);
        }
        const query = params.toString();
        return `${base}${moduleId}${query ? '?' + query : ''}`;
    }

    function ouvrirNotes() {
        const url = buildTarget('/teacher/notes/module/');
        if (url) window.location.href = url;
    }

    function ouvrirAbsences() {
        const url = buildTarget('/teacher/absences/module/');
        if (url) window.location.href = url;
    }

    updateClasses();
</script>
</body>
</html>
