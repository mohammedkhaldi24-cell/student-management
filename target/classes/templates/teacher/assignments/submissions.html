<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Soumissions Devoir')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-teacher}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Soumissions des Etudiants')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h4 class="fw-bold mb-1" th:text="${assignment.title}">Devoir</h4>
                    <small class="text-muted">
                        Date limite:
                        <span th:text="${#temporals.format(assignment.dueDate,'dd/MM/yyyy HH:mm')}">Date</span>
                    </small>
                </div>
                <a th:href="@{/teacher/assignments/{id}(id=${assignment.id})}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Retour detail
                </a>
            </div>

            <div class="card">
                <div class="card-header">
                    <h6 class="mb-0"><i class="bi bi-table me-2"></i>Tableau des soumissions</h6>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th>Etudiant</th>
                                <th>Statut</th>
                                <th>Date soumission</th>
                                <th>Rendu</th>
                                <th style="min-width: 280px;">Evaluation</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="row : ${rows}">
                                <td>
                                    <div class="fw-semibold" th:text="${row.student.fullName}">Nom</div>
                                    <small class="text-muted" th:text="${row.student.matricule}">MATRICULE</small>
                                </td>
                                <td>
                                    <span class="badge bg-secondary" th:if="${row.status.name() == 'NOT_SUBMITTED'}">Non rendu</span>
                                    <span class="badge bg-primary" th:if="${row.status.name() == 'SUBMITTED'}">Soumis</span>
                                    <span class="badge bg-info" th:if="${row.status.name() == 'REVIEWED'}">Revise</span>
                                    <span class="badge bg-success" th:if="${row.status.name() == 'GRADED'}">Note</span>
                                </td>
                                <td>
                                    <span th:if="${row.submission != null}"
                                          th:text="${#temporals.format(row.submission.submittedAt,'dd/MM/yyyy HH:mm')}">Date</span>
                                    <span th:if="${row.submission == null}" class="text-muted">-</span>
                                </td>
                                <td>
                                    <span th:if="${row.submission == null and assignment.dueDate.isBefore(now)}" class="badge bg-danger">En retard</span>
                                    <span th:if="${row.submission == null and !assignment.dueDate.isBefore(now)}" class="badge bg-warning text-dark">En attente</span>
                                    <span th:if="${row.submission != null and row.late}" class="badge bg-danger">Soumis en retard</span>
                                    <span th:if="${row.submission != null and !row.late}" class="badge bg-success">Soumis a temps</span>
                                    <div class="mt-2" th:if="${row.submission != null and !#lists.isEmpty(row.submission.files)}">
                                        <div class="d-flex flex-column gap-1">
                                            <a th:each="file : ${row.submission.files}"
                                               th:href="@{/teacher/assignments/{assignmentId}/submissions/{submissionId}/files/{fileId}(assignmentId=${assignment.id},submissionId=${row.submission.id},fileId=${file.id})}"
                                               class="btn btn-sm btn-outline-secondary text-start">
                                                <i th:class="${T(com.pfe.gestionetudiant.util.FileUiUtils).iconClass(file.filePath)}"></i>
                                                <span th:text="${T(com.pfe.gestionetudiant.util.FileUiUtils).fileName(file.filePath)}">fichier</span>
                                            </a>
                                        </div>
                                    </div>
                                    <a th:if="${row.submission != null and #lists.isEmpty(row.submission.files) and row.submission.filePath != null}"
                                       th:href="@{/teacher/assignments/{assignmentId}/submissions/{submissionId}/file(assignmentId=${assignment.id},submissionId=${row.submission.id})}"
                                       class="btn btn-sm btn-outline-secondary ms-1 mt-2">
                                        <i class="bi bi-download me-1"></i>Fichier (legacy)
                                    </a>
                                </td>
                                <td>
                                    <div th:if="${row.submission == null}" class="text-muted small">Aucune soumission a corriger.</div>
                                    <form th:if="${row.submission != null}"
                                          th:action="@{/teacher/assignments/{assignmentId}/submissions/{submissionId}/review(assignmentId=${assignment.id},submissionId=${row.submission.id})}"
                                          method="post" class="row g-2">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <div class="col-md-3">
                                            <input type="number" step="0.25" min="0" max="20"
                                                   class="form-control form-control-sm"
                                                   name="score" placeholder="Note /20"
                                                   th:value="${row.submission.score}"/>
                                        </div>
                                        <div class="col-md-3">
                                            <select class="form-select form-select-sm" name="status">
                                                <option value="">Auto</option>
                                                <option value="REVIEWED" th:selected="${row.status.name() == 'REVIEWED'}">Revise</option>
                                                <option value="GRADED" th:selected="${row.status.name() == 'GRADED'}">Note</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <input type="text" class="form-control form-control-sm"
                                                   name="feedback" placeholder="Feedback"
                                                   th:value="${row.submission.feedback}"/>
                                        </div>
                                        <div class="col-md-2 d-grid">
                                            <button class="btn btn-sm btn-success" type="submit">Valider</button>
                                        </div>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(rows)}">
                                <td colspan="5" class="text-center py-4 text-muted">Aucun etudiant cible.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
