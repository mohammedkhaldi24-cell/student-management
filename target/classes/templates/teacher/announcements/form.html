<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nouvelle Annonce')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-teacher}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Publier une Annonce')}"></div>
        <div class="content-area">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-header">
                            <h6 class="mb-0"><i class="bi bi-megaphone me-2"></i>Nouvelle annonce</h6>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/teacher/announcements/new}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                <div class="row g-3">
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Titre *</label>
                                        <input type="text" class="form-control" name="title" required
                                               placeholder="ex: Report du TD de jeudi"/>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Message *</label>
                                        <textarea class="form-control" name="message" rows="5" required
                                                  placeholder="Ecrivez votre annonce..."></textarea>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Module *</label>
                                        <select class="form-select" id="moduleSelect" name="moduleId" required onchange="updateClasseOptions()">
                                            <option value="">-- Choisir un module --</option>
                                            <option th:each="m : ${modules}"
                                                    th:value="${m.id}"
                                                    th:data-filiere="${m.filiere != null ? m.filiere.id : ''}"
                                                    th:data-filiere-name="${m.filiere != null ? m.filiere.nom : 'Filiere du module'}"
                                                    th:text="${m.nom + ' (' + m.code + ')'}">Module</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Cible Classe (optionnel)</label>
                                        <select class="form-select" id="classeSelect" name="classeId">
                                            <option value="">-- Toute la filiere --</option>
                                        </select>
                                        <small class="text-muted">La liste est chargee automatiquement depuis le module.</small>
                                    </div>

                                    <div class="col-12">
                                        <div class="alert alert-light border mb-0" id="audienceSummary">
                                            Selectionnez un module pour determiner automatiquement la filiere.
                                        </div>
                                    </div>
                                </div>

                                <div class="alert alert-info mt-3 mb-0">
                                    L'annonce cible automatiquement la filiere du module. Choisissez une classe seulement pour limiter la diffusion.
                                </div>

                                <div class="d-flex justify-content-end gap-2 mt-4">
                                    <a th:href="@{/teacher/announcements}" class="btn btn-secondary">Annuler</a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-send me-1"></i>Publier
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:inline="javascript">
    const classesByFiliere = /*[[${classesByFiliere}]]*/ {};

    function updateClasseOptions() {
        const moduleSelect = document.getElementById('moduleSelect');
        const classeSelect = document.getElementById('classeSelect');
        const summary = document.getElementById('audienceSummary');
        const selected = moduleSelect.options[moduleSelect.selectedIndex];
        const filiereId = selected ? selected.getAttribute('data-filiere') : null;
        const filiereName = selected ? selected.getAttribute('data-filiere-name') : null;

        classeSelect.innerHTML = '<option value="">-- Toute la filiere --</option>';

        if (!filiereId) {
            summary.textContent = 'Selectionnez un module pour determiner automatiquement la filiere.';
            return;
        }

        const classes = classesByFiliere[filiereId] || [];
        classes.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = `${c.nom} (${c.niveau})`;
            classeSelect.appendChild(opt);
        });

        summary.textContent = `Audience automatique: ${filiereName || 'filiere du module'} (${classes.length} classe${classes.length > 1 ? 's' : ''}).`;
    }

    updateClasseOptions();
</script>
</body>
</html>
