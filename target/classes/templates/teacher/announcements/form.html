<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nouvelle Annonce')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-teacher}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Publier une Annonce')}"></div>
        <div class="content-area">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-header">
                            <h6 class="mb-0"><i class="bi bi-megaphone me-2"></i>Nouvelle annonce</h6>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/teacher/announcements/new}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                <div class="row g-3">
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Titre *</label>
                                        <input type="text" class="form-control" name="title" required
                                               placeholder="ex: Report du TD de jeudi"/>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Message *</label>
                                        <textarea class="form-control" name="message" rows="5" required
                                                  placeholder="Ecrivez votre annonce..."></textarea>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Cible Filiere</label>
                                        <select class="form-select" id="filiereSelect" name="filiereId" onchange="updateClasseOptions()">
                                            <option value="">-- Choisir une filiere --</option>
                                            <option th:each="m : ${modules}"
                                                    th:value="${m.filiere.id}"
                                                    th:text="${m.filiere.nom}">Filiere</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Cible Classe (optionnel)</label>
                                        <select class="form-select" id="classeSelect" name="classeId">
                                            <option value="">-- Toute la filiere --</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="alert alert-info mt-3 mb-0">
                                    Choisissez une filiere. Si vous choisissez aussi une classe,
                                    l'annonce sera visible uniquement par cette classe.
                                </div>

                                <div class="d-flex justify-content-end gap-2 mt-4">
                                    <a th:href="@{/teacher/announcements}" class="btn btn-secondary">Annuler</a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-send me-1"></i>Publier
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:inline="javascript">
    const classesByFiliere = /*[[${classesByFiliere}]]*/ {};

    function uniqueFiliereOptions() {
        const select = document.getElementById('filiereSelect');
        const seen = new Set();
        const toRemove = [];
        Array.from(select.options).forEach((opt, idx) => {
            if (!opt.value) return;
            if (seen.has(opt.value)) {
                toRemove.push(idx);
            } else {
                seen.add(opt.value);
            }
        });
        toRemove.reverse().forEach(idx => select.remove(idx));
    }

    function updateClasseOptions() {
        const filiereId = document.getElementById('filiereSelect').value;
        const classeSelect = document.getElementById('classeSelect');
        classeSelect.innerHTML = '<option value="">-- Toute la filiere --</option>';

        (classesByFiliere[filiereId] || []).forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = `${c.nom} (${c.niveau})`;
            classeSelect.appendChild(opt);
        });
    }

    uniqueFiliereOptions();
    updateClasseOptions();
</script>
</body>
</html>
