<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Annonces')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-teacher}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Mes Annonces')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="bi bi-megaphone-fill me-2"></i>Annonces publiees</h6>
                    <a th:href="@{/teacher/announcements/new}" class="btn btn-primary btn-sm">
                        <i class="bi bi-plus-circle me-1"></i>Nouvelle annonce
                    </a>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th>Titre</th>
                                <th>Message</th>
                                <th>Cible</th>
                                <th>Date</th>
                                <th class="text-center">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="a : ${announcements}">
                                <td class="fw-semibold" th:text="${a.title}">Titre</td>
                                <td class="small" th:text="${a.message}">Message</td>
                                <td>
                                    <span th:if="${a.targetClasse != null}" class="badge bg-primary"
                                          th:text="${'Classe: ' + a.targetClasse.nom}">Classe</span>
                                    <span th:if="${a.targetClasse == null and a.targetFiliere != null}" class="badge bg-info"
                                          th:text="${'Filiere: ' + a.targetFiliere.nom}">Filiere</span>
                                </td>
                                <td th:text="${#temporals.format(a.createdAt,'dd/MM/yyyy HH:mm')}">01/04/2026</td>
                                <td class="text-center">
                                    <form th:action="@{/teacher/announcements/{id}/delete(id=${a.id})}" method="post"
                                          onsubmit="return confirm('Supprimer cette annonce ?')" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(announcements)}">
                                <td colspan="5" class="text-center py-4 text-muted">Aucune annonce publiee.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
