<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nouveau Contenu')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-teacher}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Publier un Contenu de Cours')}"></div>
        <div class="content-area">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-header">
                            <h6 class="mb-0"><i class="bi bi-upload me-2"></i>Nouveau contenu pedagogique</h6>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/teacher/courses/new}" method="post" enctype="multipart/form-data">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                <div class="row g-3">
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Titre *</label>
                                        <input type="text" class="form-control" name="title" required
                                               placeholder="ex: Chapitre 3 - Programmation Web"/>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Description</label>
                                        <textarea class="form-control" name="description" rows="4"
                                                  placeholder="Consignes, objectifs, exercices, references..."></textarea>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Module *</label>
                                        <select class="form-select" id="moduleSelect" name="moduleId" required onchange="syncTargets()">
                                            <option value="">-- Choisir --</option>
                                            <option th:each="m : ${modules}"
                                                    th:value="${m.id}"
                                                    th:data-filiere="${m.filiere.id}"
                                                    th:text="${m.nom + ' (' + m.code + ')'}">Module</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Fichier (optionnel)</label>
                                        <input type="file" class="form-control" name="file"/>
                                        <small class="text-muted">PDF, DOCX, PPT, ZIP...</small>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Cible Filiere</label>
                                        <select class="form-select" id="filiereSelect" name="filiereId">
                                            <option value="">-- Filiere du module (auto) --</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Cible Classe (prioritaire)</label>
                                        <select class="form-select" id="classeSelect" name="classeId">
                                            <option value="">-- Toute la filiere --</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="alert alert-info mt-3 mb-0">
                                    Si une classe est selectionnee, la publication sera limitee a cette classe.
                                    Sinon, elle sera visible par toute la filiere.
                                </div>

                                <div class="d-flex justify-content-end gap-2 mt-4">
                                    <a th:href="@{/teacher/courses}" class="btn btn-secondary">Annuler</a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-send me-1"></i>Publier
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:inline="javascript">
    const classesByFiliere = /*[[${classesByFiliere}]]*/ {};

    function syncTargets() {
        const module = document.getElementById('moduleSelect');
        const filiereSelect = document.getElementById('filiereSelect');
        const classeSelect = document.getElementById('classeSelect');

        const selected = module.options[module.selectedIndex];
        const filiereId = selected ? selected.getAttribute('data-filiere') : null;

        filiereSelect.innerHTML = '<option value="">-- Filiere du module (auto) --</option>';
        classeSelect.innerHTML = '<option value="">-- Toute la filiere --</option>';

        if (!filiereId) {
            return;
        }

        const option = document.createElement('option');
        option.value = filiereId;
        option.selected = true;
        option.textContent = 'Filiere du module';
        filiereSelect.appendChild(option);

        (classesByFiliere[filiereId] || []).forEach(c => {
            const cOpt = document.createElement('option');
            cOpt.value = c.id;
            cOpt.textContent = `${c.nom} (${c.niveau})`;
            classeSelect.appendChild(cOpt);
        });
    }

    syncTargets();
</script>
</body>
</html>
