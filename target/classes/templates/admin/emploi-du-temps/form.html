<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Seance Emploi du Temps')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-admin}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Seance Emploi du Temps')}"></div>
        <div class="content-area">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-header">
                            <h6 class="mb-0">
                                <i class="bi bi-calendar3-week me-2"></i>
                                <span th:text="${emploi.id != null} ? 'Modifier la seance' : 'Ajouter une seance'">Seance</span>
                            </h6>
                        </div>
                        <div class="card-body">
                            <form th:action="${emploi.id != null} ? @{/admin/emploi-du-temps/{id}/edit(id=${emploi.id})} : @{/admin/emploi-du-temps/new}"
                                  th:object="${emploi}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Jour *</label>
                                        <select class="form-select" th:field="*{jour}" required>
                                            <option value="">-- Choisir --</option>
                                            <option th:each="j : ${jours}" th:value="${j}" th:text="${j}">LUNDI</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Heure debut *</label>
                                        <input type="time" class="form-control" th:field="*{heureDebut}" required/>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Heure fin *</label>
                                        <input type="time" class="form-control" th:field="*{heureFin}" required/>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Module *</label>
                                        <select class="form-select" name="moduleId" required>
                                            <option value="">-- Choisir --</option>
                                            <option th:each="m : ${modules}"
                                                    th:value="${m.id}"
                                                    th:text="${m.nom + ' (' + m.code + ')'}"
                                                    th:selected="${emploi.module != null and emploi.module.id == m.id}">Module</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Enseignant</label>
                                        <select class="form-select" name="teacherId">
                                            <option value="">-- Auto selon module --</option>
                                            <option th:each="t : ${teachers}"
                                                    th:value="${t.id}"
                                                    th:text="${t.fullName}"
                                                    th:selected="${emploi.teacher != null and emploi.teacher.id == t.id}">Teacher</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Filiere *</label>
                                        <select class="form-select" name="filiereId" required>
                                            <option value="">-- Choisir --</option>
                                            <option th:each="f : ${filieres}"
                                                    th:value="${f.id}"
                                                    th:text="${f.nom}"
                                                    th:selected="${emploi.filiere != null and emploi.filiere.id == f.id}">Filiere</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Classe *</label>
                                        <select class="form-select" name="classeId" required>
                                            <option value="">-- Choisir --</option>
                                            <option th:each="c : ${classes}"
                                                    th:value="${c.id}"
                                                    th:text="${c.nom + ' (' + c.niveau + ')'}"
                                                    th:selected="${emploi.classe != null and emploi.classe.id == c.id}">Classe</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Salle *</label>
                                        <input type="text" class="form-control" th:field="*{salle}" placeholder="ex: Salle B12" required/>
                                    </div>
                                    <div class="col-md-6 d-flex align-items-end">
                                        <div class="form-check form-switch mb-2">
                                            <input class="form-check-input" type="checkbox" th:field="*{valide}" role="switch"/>
                                            <label class="form-check-label">Seance validee</label>
                                        </div>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-end gap-2 mt-4">
                                    <a th:href="@{/admin/emploi-du-temps}" class="btn btn-secondary">Annuler</a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-save me-1"></i>Enregistrer
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
