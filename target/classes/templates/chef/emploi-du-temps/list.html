<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Emploi du Temps Filiere')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-chef}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Emploi du Temps de la Filiere')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">
                        <i class="bi bi-calendar3-week me-2"></i>
                        Planning - <span th:text="${filiere.nom}">Filiere</span>
                    </h6>
                    <a th:href="@{/chef/emploi-du-temps/new}" class="btn btn-primary btn-sm">
                        <i class="bi bi-plus-circle me-1"></i>Ajouter une seance
                    </a>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th>Jour</th>
                                <th>Horaire</th>
                                <th>Classe</th>
                                <th>Module</th>
                                <th>Enseignant</th>
                                <th>Salle</th>
                                <th>Etat</th>
                                <th class="text-center">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="e : ${emplois}">
                                <td class="fw-semibold" th:text="${e.jour}">LUNDI</td>
                                <td th:text="${#temporals.format(e.heureDebut,'HH:mm') + ' - ' + #temporals.format(e.heureFin,'HH:mm')}">08:30-10:30</td>
                                <td th:text="${e.classe != null ? e.classe.nom : '-'}">Classe</td>
                                <td th:text="${e.module != null ? e.module.nom : '-'}">Module</td>
                                <td th:text="${e.teacher != null ? e.teacher.fullName : 'Non assigne'}">Teacher</td>
                                <td th:text="${e.salle}">Salle</td>
                                <td><span class="badge bg-success">Valide</span></td>
                                <td class="text-center">
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/chef/emploi-du-temps/{id}/edit(id=${e.id})}" class="btn btn-outline-warning">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form th:action="@{/chef/emploi-du-temps/{id}/delete(id=${e.id})}" method="post"
                                              onsubmit="return confirm('Supprimer cette seance ?')">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button class="btn btn-outline-danger">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(emplois)}">
                                <td colspan="8" class="text-center py-4 text-muted">Aucune seance enregistree.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
