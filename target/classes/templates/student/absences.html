<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Mes Absences')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-student}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Mes Absences')}"></div>
        <div class="content-area">
            <div class="d-flex flex-wrap gap-2 mb-3">
                <a th:href="@{/student/dashboard}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Retour Dashboard
                </a>
                <a th:href="@{/student/modules}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-journal-bookmark me-1"></i>Choisir un module
                </a>
                <a th:href="@{/student/notes}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-journal-check me-1"></i>Voir mes notes
                </a>
                <a th:href="@{/student/emploi-du-temps}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-calendar3-week me-1"></i>Voir l'emploi du temps
                </a>
            </div>

            <div class="card mb-3">
                <div class="card-body">
                    <form method="get" th:action="@{/student/absences}" class="row g-2 align-items-end">
                        <div class="col-md-8 col-lg-6">
                            <label for="moduleId" class="form-label mb-1">
                                <i class="bi bi-calendar-x me-1"></i>Filtrer par module
                            </label>
                            <select id="moduleId" name="moduleId" class="form-select">
                                <option value="" th:selected="${selectedModuleId == null}">Tous les modules</option>
                                <option th:each="module : ${availableModules}"
                                        th:value="${module.id}"
                                        th:selected="${selectedModuleId != null && selectedModuleId == module.id}"
                                        th:text="${module.nom + ' (' + module.code + ')'}">Module</option>
                            </select>
                        </div>
                        <div class="col-md-4 col-lg-3 d-flex gap-2">
                            <button type="submit" class="btn btn-primary w-100">Appliquer</button>
                            <a th:href="@{/student/absences}" class="btn btn-outline-secondary">Reset</a>
                        </div>
                        <div class="col-12" th:if="${selectedModule != null}">
                            <a th:href="@{/student/modules/{id}(id=${selectedModule.id})}" class="btn btn-sm btn-outline-primary mt-2">
                                <i class="bi bi-arrow-right-circle me-1"></i>Ouvrir details du module selectionne
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-body">
                            <div class="mb-2" th:if="${selectedModule != null}">
                                <span class="badge bg-primary">
                                    Module: <span th:text="${selectedModule.nom}">Module</span>
                                </span>
                            </div>
                            <div class="text-muted small">Total des absences</div>
                            <div class="fs-4 fw-bold" th:text="${totalHeuresAbsence + 'h'}">0h</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-body">
                            <div class="text-muted small">Heures non justifiees</div>
                            <div class="fs-4 fw-bold text-danger" th:text="${totalHeuresNJ + 'h'}">0h</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">
                        <i class="bi bi-calendar-x me-2 text-danger"></i>Historique des absences
                    </h6>
                    <a th:href="@{/student/dashboard}" class="btn btn-sm btn-outline-secondary">Retour Dashboard</a>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table mb-0">
                            <thead>
                            <tr>
                                <th>Date</th>
                                <th>Module</th>
                                <th class="text-center">Heures</th>
                                <th class="text-center">Justifiee</th>
                                <th>Motif</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="abs : ${absences}">
                                <td th:text="${#temporals.format(abs.dateAbsence,'dd/MM/yyyy')}">-</td>
                                <td th:text="${abs.module.nom}">-</td>
                                <td class="text-center"><span class="badge bg-secondary" th:text="${abs.nombreHeures + 'h'}">0h</span></td>
                                <td class="text-center">
                                    <span th:if="${abs.justifiee}" class="badge bg-success">Oui</span>
                                    <span th:unless="${abs.justifiee}" class="badge bg-danger">Non</span>
                                </td>
                                <td class="text-muted small" th:text="${abs.motif ?: '-'}">-</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(absences)}">
                                <td colspan="5" class="text-center py-4 text-success">
                                    <i class="bi bi-check-circle-fill fs-3 d-block mb-2"></i>
                                    Aucune absence enregistree.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
