<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Mes Modules')}"></head>
<body class="dashboard-body">
<div class="layout-wrapper">
    <div th:replace="~{fragments/layout :: sidebar-student}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Mes Modules')}"></div>
        <div class="content-area">
            <div class="d-flex flex-wrap gap-2 mb-3">
                <a th:href="@{/student/dashboard}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Retour Dashboard
                </a>
                <a th:href="@{/student/notes}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-graph-up me-1"></i>Mes notes
                </a>
                <a th:href="@{/student/absences}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-calendar-x me-1"></i>Mes absences
                </a>
            </div>

            <div class="card mb-4">
                <div class="card-body d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2">
                    <div>
                        <h5 class="mb-1"><i class="bi bi-journal-bookmark-fill me-2 text-primary"></i>Selectionnez un module</h5>
                        <p class="text-muted mb-0">Affichez uniquement les notes et absences du module choisi.</p>
                    </div>
                    <span class="badge bg-primary fs-6" th:text="${#lists.size(modules)} + ' modules'">0 modules</span>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-12 col-md-6 col-xl-4" th:each="module : ${modules}">
                    <div class="card h-100 shadow-sm border-0">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h6 class="fw-bold mb-0" th:text="${module.nom}">Module</h6>
                                <span class="badge bg-light text-dark" th:text="${module.code}">CODE</span>
                            </div>
                            <div class="small text-muted mb-1">
                                <i class="bi bi-person-workspace me-1"></i>
                                <span th:text="${module.teacher != null ? module.teacher.fullName : 'Enseignant non assigne'}">Enseignant</span>
                            </div>
                            <div class="small text-muted mb-3">
                                <i class="bi bi-diagram-3 me-1"></i>
                                <span th:text="${module.filiere != null ? module.filiere.nom : '-'}">Filiere</span>
                                <span class="ms-2">
                                    <i class="bi bi-calendar3 me-1"></i><span th:text="${module.semestre}">S1</span>
                                </span>
                            </div>
                            <a th:href="@{'/student/modules/' + ${module.id}}" class="btn btn-primary btn-sm w-100">
                                <i class="bi bi-arrow-right-circle me-1"></i>Voir details du module
                            </a>
                        </div>
                    </div>
                </div>

                <div class="col-12" th:if="${#lists.isEmpty(modules)}">
                    <div class="alert alert-warning mb-0">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        Aucun module n'est associe a votre filiere pour le moment.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
