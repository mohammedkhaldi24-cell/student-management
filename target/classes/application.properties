# ========================================
# Application Configuration - PFE Gestion Etudiant
# ========================================

spring.application.name=gestion-etudiant

# ========================================
# Base de données MySQL
# ========================================
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_etudiant?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ========================================
# JPA / Hibernate
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ========================================
# Thymeleaf
# ========================================
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ========================================
# Serveur
# ========================================
server.port=${SERVER_PORT:8081}
server.error.whitelabel.enabled=false

# ========================================
# Upload de fichiers
# ========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ========================================
# Email notifications (optional)
# ========================================
app.mail.enabled=${APP_MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ========================================
# Logging
# ========================================
logging.level.com.pfe=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
